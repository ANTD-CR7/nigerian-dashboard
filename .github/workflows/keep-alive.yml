name: Keep Services Alive

on:
  schedule:
    # Render's free tier spins the API down after ~15 minutes idle, which makes
    # the first request hang for 60-90s (bad for demos and API consumers).
    # Ping every 10 minutes to keep it warm; the same run also touches Supabase
    # so the database project never pauses for inactivity.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 https://npedata-api.onrender.com/)
          echo "Render API responded: HTTP $code"

      - name: Ping Supabase
        run: |
          curl -s "https://fjsytcmcxapfbrwvawmu.supabase.co/rest/v1/observations?indicator_id=eq.inflation&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqc3l0Y21jeGFwZmJyd3Zhd211Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTcxOTgsImV4cCI6MjA5MTQ3MzE5OH0.0lGkBdBsY7bQGu4jlHQA0MKm54dd51QwJTdeill_ADw" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqc3l0Y21jeGFwZmJyd3Zhd211Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTcxOTgsImV4cCI6MjA5MTQ3MzE5OH0.0lGkBdBsY7bQGu4jlHQA0MKm54dd51QwJTdeill_ADw" \
            && echo "Supabase is alive"
