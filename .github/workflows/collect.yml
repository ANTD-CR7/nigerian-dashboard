name: Collect source data

# Automated data collection. Runs weekly (and on demand). By default it only
# produces a reviewable JSON snapshot artifact -- it does NOT write to the
# database. To let it upsert into Supabase, set the repo secrets and flip
# NPE_COLLECT_WRITE to "true".

on:
  schedule:
    - cron: "17 5 * * 1"   # every Monday 05:17 UTC
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run collectors (demo-safe snapshot)
        env:
          NPE_COLLECT_WRITE: ${{ vars.NPE_COLLECT_WRITE }}   # "true" to write
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install supabase >/dev/null 2>&1 || true
          python -m collectors.runner ${{ vars.NPE_COLLECT_WRITE == 'true' && '--write' || '' }}
      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: collected-data
          path: data/collected/*.json
          if-no-files-found: warn
