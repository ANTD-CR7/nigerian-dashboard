# Tooling configuration for the NPEDATA backend (tests + linting).
# The backend runs from main.py; this file configures pytest and ruff only.
#
# Copyright 2026 Taoheed Abdulmanan Olaosebikan. Apache-2.0.

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["."]

[tool.ruff]
line-length = 110
target-version = "py310"
extend-exclude = ["offline_backup", "project/frontend", "sdk"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]  # line length handled by formatter, not enforced hard
